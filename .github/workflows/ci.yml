# Runs on every push and pull request: syntax check + tests for user_service.
name: CI

on:
  push:
  pull_request:

# Cancel older runs on the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  user-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user_service

    env:
      # Required so app.db.session can create the async engine at import time.
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
      SECRET_KEY: ci-test-secret-key-must-be-long-enough-for-jwt-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: user_service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall app -q

      - name: Run tests
        run: pytest tests -q --tb=short
